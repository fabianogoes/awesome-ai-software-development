name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CONCEPTS.md'
      - 'BOOKS.md'
      - 'CLAUDE_TIPS.md'
      - 'docs/purpose.md'
      - 'docs/shared-resources.md'
      - 'src/build.py'
      - 'src/test_build.py'
      - 'src/test_claude_post_edit_check.py'
      - 'src/test_pages_workflow.py'
      - 'images/claude-jumping.svg'
      - 'images/MIT.png'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build HTML from Markdown
        run: python3 src/build.py

      - name: Assemble public artifact
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp -R images dist/images

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
